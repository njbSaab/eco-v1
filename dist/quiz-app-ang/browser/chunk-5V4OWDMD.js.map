  <app-banner
    [quizCount]="quizCount"
    [page]="banner"
  ></app-banner>

<section class="contact mt-0 mb-8 md:my-8">
  <div class="container px-6 py-12 mx-auto">
    <div class="lg:flex lg:items-center lg:-mx-6">

      <!-- Левая колонка — Информация -->
      <div class="lg:w-1/2 lg:mx-6">
        <h2 class="text-2xl capitalize lg:text-3xl font-semibold tracking-tight cursor-pointer">
          <span class="bg-gradient-to-r from-zinc-200 via-red-500 to-zinc-100 bg-clip-text text-transparent">
            {{ data?.title || "We're always ready to listen..." }}
          </span>
        </h2>

        <div class="mt-6 space-y-8 md:mt-8">
          <!-- Адрес -->
          <p class="flex items-start -mx-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mx-2 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="mx-2 truncate w-72 text-gray-400">{{ data?.address || 'VoteVibe' }}</span>
          </p>

          <!-- Часы работы -->
          <p class="flex items-start -mx-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mx-2 text-cyan-500" viewBox="0 0 24 24">
              <path fill="#06b6d4" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2M12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8s8 3.58 8 8s-3.58 8-8 8"/>
              <path fill="#06b6d4" d="M12.5 7H11v6l5.25 3.15l.75-1.23l-4.5-2.67z"/>
            </svg>
            <span class="mx-2 truncate w-72 text-gray-400">
              {{ data?.workingHours || 'Monday to Friday, 10:00–18:00 (GMT+7)' }}
            </span>
          </p>

          <!-- Email -->
          <p class="flex items-start -mx-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mx-2 text-cyan-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <span class="mx-2 truncate w-72 text-gray-400">
              {{ data?.email || 'hello@votevibe.club' }}
            </span>
          </p>
        </div>

        <!-- Соцсети — полностью динамические -->
        <div class="mt-6 w-80 md:mt-8" *ngIf="socials">
          <h3 class="dark:text-gray-300">{{ data?.socialsTitle || 'Social Media...' }}</h3>
          <div class="flex mt-4 -mx-1.5">

            <a *ngIf="socials.twitter" [href]="socials.twitter" target="_blank"
               class="mx-1.5 text-gray-400 transition-colors duration-300 transform hover:text-red-500">
              <svg class="w-10 h-10 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.6668 6.67334C18.0002 7.00001 17.3468 7.13268 16.6668 7.33334C15.9195 6.49001 14.8115 6.44334 13.7468 6.84201C12.6822 7.24068 11.9848 8.21534 12.0002 9.33334V10C9.83683 10.0553 7.91016 9.07001 6.66683 7.33334C6.66683 7.33334 3.87883 12.2887 9.3335 14.6667C8.0855 15.498 6.84083 16.0587 5.3335 16C7.53883 17.202 9.94216 17.6153 12.0228 17.0113C14.4095 16.318 16.3708 14.5293 17.1235  prenot11.85C17.348 11.0351 17.4595 10.1932 17.4548 9.34801C17.4535 9.18201 18.4615 7.50001 18.6668 6.67268V6.67334Z"/>
              </svg>
            </a>

            <a *ngIf="socials.linkedin" [href]="socials.linkedin" target="_blank"
               class="mx-1.5 text-gray-400 transition-colors duration-300 transform hover:text-red-500">
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M15.2 8.8a4.8 4.8 0 0 1 4.8 4.8V19.2h-3.2v-5.6a1.6 1.6 0 0 0-3.2 0V19.2h-3.2v-9.6h3.2v1.44a3.21 3.21 0 0 1 2.88-1.6zM7.2 9.6H4v9.6h3.2V9.6zM5.6 4a1.6 1.6 0 1 1 0 3.2 1.6 1.6 0 0 1 0-3.2z"/></svg>
            </a>

            <a *ngIf="socials.facebook" [href]="socials.facebook" target="_blank"
               class="mx-1.5 text-gray-400 transition-colors duration-300 transform hover:text-red-500">
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10.2222V13.7778H9.66667V20H13.2222V13.7778H15.8889L16.7778 10.2222H13.2222V8.44444C13.2222 8.2087 13.3159 7.9826 13.4826 7.81591C13.6493 7.64921 13.8754 7.55556 14.1111 7.55556H16.7778V4H14.1111C12.9324 4 11.8019 4.46825 10.9684 5.30175C10.1349 6.13524 9.66667 7.2657 9.66667 8.44444V10.2222H7Z"/></svg>
            </a>

            <a *ngIf="socials.instagram" [href]="socials.instagram" target="_blank"
               class="mx-1.5 text-gray-400 transition-colors duration-300 transform hover:text-red-500">
              <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M11.9294 7.72275C9.65868 7.72275 7.82715 9.55428 7.82715 11.825C7.82715 14.0956 9.65868 15.9271 11.9294 15.9271C14.2 15.9271 16.0316 14.0956 16.0316 11.825C16.0316 9.55428 14.2 7.72275 11.9294 7.72275ZM11.9294 14.4919C10.462 14.4919 9.26239 13.2959 9.26239 11.825C9.26239 10.354 10.4584 9.15799 11.9294 9.15799C13.4003 9.15799 14.5963 10.354 14.5963 11.825C14.5963 13.2959 13.3967 14.4919 11.9294 14.4919ZM17.1562 7.55495C17.1562 8.08692 16.7277 8.51178 16.1994 8.51178C15.6674 8.51178 15.2425 8.08335 15.2425 7.55495C15.2425 7.02656 15.671 6.59813 16.1994 6.59813C16.7277 6.59813 17.1562 7.02656 17.1562 7.55495ZM19.8731 8.52606C19.8124 7.24434 19.5197 6.10901 18.5807 5.17361C17.6453 4.23821 16.51 3.94545 15.2282 3.88118C13.9073 3.80621 9.94787 3.80621 8.62689 3.88118C7.34874 3.94188 6.21341 4.23464 5.27444 5.17004C4.33547 6.10544 4.04628 7.24077 3.98201 8.52249C3.90704 9.84347 3.90704 13.8029 3.98201 15.1238C4.04271 16.4056 4.33547 17.5409 5.27444 18.4763C6.21341 19.4117 7.34517 19.7045 8.62689 19.7687C9.94787 19.8437 13.9073 19.8437 15.2282 19.7687C16.51 19.708 17.6453 19.4153 18.5807 18.4763C19.5161 17.5409 19.8089 16.4056 19.8731 15.1238C19.9481 13.8029 19.9481 9.84704 19.8731 8.52606ZM18.1665 16.5412C17.8881 17.241 17.349 17.7801 16.6456 18.0621C15.5924 18.4799 13.0932 18.3835 11.9294 18.3835C10.7655 18.3835 8.26272 18.4763 7.21307 18.0621C6.51331 17.7837 5.9742 17.2446 5.69215 16.5412C5.27444 15.488 5.37083 12.9888 5.37083 11.825C5.37083 10.6611 5.27801 8.15832 5.69215 7.10867C5.97063 6.40891 6.50974 5.8698 7.21307 5.58775C8.26629 5.17004 10.7655 5.26643 11.9294 5.26643C13.0932 5.26643 15.596 5.17361 16.6456 5.58775C17.3454 5.86623 17.8845 6.40534 18.1665 7.10867C18.5843 8.16189 18.4879 10.6611 18.4879 11.825C18.4879 12.9888 18.5843 15.4916 18.1665 16.5412Z"/></svg>
            </a>
          </div>
        </div>
      </div>

      <!-- Правая колонка — Форма (100% динамическая) -->
      <div class="mt-8 lg:w-1/2 lg:mx-6">
        <div class="w-full px-8 py-10 mx-auto overflow-hidden rounded-lg shadow-2xl bg-gradient-blue-180 bg-shadow-cayn lg:max-w-xl">
          <h1 class="text-lg font-medium text-white">{{ form.title || 'Leave Us a Message' }}</h1>

          <form class="mt-6">
            <div class="flex-1">
              <label class="block mb-2 text-sm text-gray-200">{{ form.nameLabel || '姓名（必填）' }}</label>
              <input type="text" [placeholder]="form.namePlaceholder || 'John Doe'"
                     class="block w-full px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 border border-gray-200 rounded-md placeholder-gray-600 bg-gray-900 border-gray-700 focus:border-cyan-400 focus:ring-cyan-400 focus:outline-none focus:ring focus:ring-opacity-40 text-cyan-400" />
            </div>

            <div class="flex-1 mt-6">
              <label class="block mb-2 text-sm text-gray-600 dark:text-gray-200">{{ form.emailLabel || 'Name (required)' }}</label>
              <input type="email" [placeholder]="form.emailPlaceholder || 'johndoe@example.com'"
                     class="block w-full px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 border border-gray-200 rounded-md placeholder-gray-600 bg-gray-900 border-gray-700 focus:border-cyan-400 focus:ring-cyan-400 focus:outline-none focus:ring focus:ring-opacity-40 text-cyan-400" />
            </div>

            <div class="w-full mt-6">
              <label class="block mb-2 text-sm text-gray-600 dark:text-gray-200">{{ form.messageLabel || 'Email (required)' }}</label>
              <textarea [placeholder]="form.messagePlaceholder || '請在此輸入您的訊息...'"
                        class="block w-full px-5 py-3 mt-2 text-gray-700 placeholder-gray-400 border border-gray-200 rounded-md placeholder-gray-600 bg-gray-900 border-gray-700 focus:border-cyan-400 focus:ring-cyan-400 focus:outline-none focus:ring focus:ring-opacity-40 text-cyan-400 h-[100px] md:h-[150px]"></textarea>
            </div>

            <button type="submit"
                    class="flex w-fit mx-auto mt-6 items-center justify-center rounded-2xl px-5 py-3 text-sm sm:text-base font-semibold bg-gradient-to-r from-zinc-900 via-red-700 to-zinc-800 text-white shadow-lg shadow-red-700/30 hover:opacity-95 transition">
              {{ form.submitButton || 'Send' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
