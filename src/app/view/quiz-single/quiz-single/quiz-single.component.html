<div *ngIf="quiz; else notFound" class="quiz-detail h-space lg:mb-14 mb-0 mt-4">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 lg:py-8 py-0 ">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16 items-start mt-4 mb-0 lg:mb-8 relative">

      <!-- ── LEFT: Image + thumbnails ── -->
      <div class="flex flex-col gap-4 thumbnails-wrapper" [@blurIn]>

        <!-- Main image stack -->
        <figure
          class="relative img-stack-wrapper img-stack-clickable"
          (click)="openLightbox(0)"
          title="Click to view gallery">

          <img *ngIf="quiz.previewImage" class="rounded-2xl" [src]="quiz.previewImage" [alt]="quiz.title"/>
          <img *ngIf="quiz.previewImage" class="rounded-2xl" [src]="quiz.previewImage" [alt]="quiz.title"/>
          <img *ngIf="quiz.previewImage" class="rounded-2xl" [src]="quiz.previewImage" [alt]="quiz.title"/>
          <img *ngIf="quiz.previewImage" class="rounded-2xl" [src]="quiz.previewImage" [alt]="quiz.title"/>
          <img *ngIf="quiz.previewImage" class="rounded-2xl" [src]="quiz.previewImage" [alt]="quiz.title"/>

          <!-- Zoom badge -->
          <span class="img-zoom-badge" *ngIf="quiz.previewImage">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <span class="img-zoom-badge__label">
              {{ galleryImages.length > 1 ? galleryImages.length + ' photos' : 'View' }}
            </span>
          </span>
        </figure>

        <!-- Thumbnail strip (only shown when multiple images exist) -->
        <div class="thumb-strip" *ngIf="galleryImages.length > 1">
          <button
            class="thumb-item"
            *ngFor="let src of galleryImages; let i = index"
            (click)="openLightbox(i)">
            <img [src]="src" [alt]="quiz.title + ' photo ' + (i + 1)" />
            <span class="thumb-index">{{ i + 1 }}</span>
          </button>
        </div>

      </div>

      <!-- ── RIGHT: Product details ── -->
      <div class="flex flex-col gap-2 lg:gap-5 mt-[-45px]">

        <!-- Badge -->
        <span class="w-fit text-xs font-semibold tracking-widest uppercase px-3 py-1 rounded-full
                     bg-red-900/30 border border-red-700/40 text-red-400">
          New Arrival
        </span>

        <!-- Title -->
        <h1 class="text-3xl lg:text-4xl font-bold leading-tight">
          <span class="bg-gradient-to-r from-red-900 via-red-400 to-red-800 bg-clip-text text-transparent">
            {{ quiz.title }}
          </span>
        </h1>

        <!-- Rating + Date -->
        <div class="flex items-center gap-4 flex-wrap">
          <div class="rating rating-sm">
            <input
              *ngFor="let star of [1,2,3,4,5]; let i = index"
              type="radio"
              name="rating-{{ quiz.id }}"
              class="mask mask-star bg-red-v"
              [ngClass]="{ filled: i < (quiz.rating || 0) }"
            />
          </div>
          <span class="text-zinc-400 text-sm">{{ quiz.createdAt | date }}</span>
        </div>

        <!-- Price -->
        <div *ngIf="quiz.titleAdm" class="flex items-baseline gap-2">
          <span class="text-4xl font-bold bg-gradient-to-r from-red-400 via-red-100 to-red-500
                       bg-clip-text text-transparent tracking-tight">
            {{ quiz.titleAdm }}$
          </span>
          <span class="text-sm text-zinc-500 line-through">
            {{ discountedPrice }}$
          </span>
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full
                       bg-red-900/30 border border-red-700/40 text-red-400 ml-1">
            −20%
          </span>
        </div>

        <!-- Divider -->
        <div class="h-px bg-gradient-to-r from-transparent via-red-800/50 to-transparent"></div>

        <!-- Description -->
        <p *ngIf="quiz.description" class="text-zinc-300 leading-relaxed text-base">
          {{ quiz.description }}
        </p>

        <!-- Product details block -->
        <div *ngIf="quiz.firstPage"
             class="rounded-xl border border-zinc-700/50 bg-zinc-900/60 p-5 text-sm text-zinc-300 leading-relaxed">
          <h3 class="text-white font-semibold mb-3 flex items-center gap-2">
            <span class="inline-block w-1 h-4 rounded-full bg-red-600"></span>
            Product Details
          </h3>
          <p [innerHTML]="quiz.firstPage"></p>
        </div>

        <!-- Action buttons -->
        <div class="flex flex-col sm:flex-row gap-3 pt-2">
          <button
            (click)="addToCart()"
            class="flex-1 inline-flex items-center justify-center gap-2 rounded-2xl px-6 py-3
                   font-semibold bg-gradient-to-r from-zinc-900 via-red-700 to-zinc-800
                   text-white shadow-lg shadow-red-700/30 hover:opacity-90 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5.5 6H21l-1.68 8.39c-.16.8-.87 1.61-1.85 1.61H8.55c-.99 0-1.7-.82-1.85-1.62L5.5 6zM3 2H1v2h2l3.6 7.59L5.25 14A2 2 0 0 0 7 17h14v-2H7.42a.25.25 0 0 1-.25-.25l.03-.12L8.1 13h9.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21L4.27 2H3z"/>
            </svg>
            {{ cartService.isInCart(quiz!.id) ? 'In Cart ✓' : 'Add to Cart' }}
          </button>

          <button
            (click)="toggleFavorite()"
            class="inline-flex items-center justify-center gap-2 rounded-2xl px-6 py-3
                   font-semibold border transition"
            [class.border-red-600]="favoritesService.isFavorite(quiz!.id)"
            [class.text-red-400]="favoritesService.isFavorite(quiz!.id)"
            [class.border-zinc-600]="!favoritesService.isFavorite(quiz!.id)"
            [class.text-zinc-300]="!favoritesService.isFavorite(quiz!.id)">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24"
                 [attr.fill]="favoritesService.isFavorite(quiz!.id) ? 'currentColor' : 'none'"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            {{ favoritesService.isFavorite(quiz!.id) ? 'Saved ♥' : 'Wishlist' }}
          </button>
        </div>
        
        
        <!-- Related products -->
        <div *ngIf="relatedQuizzes.length"
             class="flex gap-3 overflow-x-auto pb-2 pt-2"
             style="scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;">
          <div
            *ngFor="let item of relatedQuizzes"
            class="flex-shrink-0 w-48"
            style="scroll-snap-align: start;">
            <div class="card bg-card-gradient h-full" style="position: relative;">
              <!-- Wishlist -->
              <button
                class="btn btn-circle btn-sm bg-transparent border transition absolute right-2 top-2"
                style="z-index: 10;"
                [class.border-red-600]="favoritesService.isFavorite(item.id)"
                [class.text-red-400]="favoritesService.isFavorite(item.id)"
                [class.border-zinc-600]="!favoritesService.isFavorite(item.id)"
                [class.text-zinc-400]="!favoritesService.isFavorite(item.id)"
                (click)="$event.stopPropagation(); favoritesService.toggle(item)"
                title="Add to Favorites">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                     [attr.fill]="favoritesService.isFavorite(item.id) ? 'currentColor' : 'none'"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
              </button>
              <!-- Card link -->
              <a [routerLink]="['/quiz', item.id]"
                 class="flex flex-col h-full no-underline text-inherit">
                <figure>
                  <img *ngIf="item.previewImage" [src]="item.previewImage" [alt]="item.title" />
                </figure>
                <div class="card-body p-3 flex-1">
                  <div class="flex justify-between items-center">
                    <span class="text-xs text-zinc-400 p-2 badge bg-red-v">sale</span>
                    <div class="rating rating-sm">
                      <input
                        *ngFor="let star of [1,2,3,4,5]; let i = index"
                        type="radio"
                        name="rel-rating-{{ item.id }}"
                        class="mask mask-star bg-red-v w-[12px] h-[12px]"
                        [ngClass]="{ filled: i < (item.rating || 0) }"
                      />
                    </div>
                  </div>
                  <h3 class="text-sm font-semibold text-white leading-tight mt-1">{{ item.title }}</h3>
                  <p *ngIf="item.titleAdm" class="text-red-400 font-bold text-sm">{{ item.titleAdm }}$</p>
                </div>
                <div class="p-3 pt-0">
                  <span class="btn btn-accent btn-card btn-sm w-full text-base-200 flex items-center justify-center gap-1">
                    <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                      <path d="M8 5v14l11-7z" />
                    </svg>
                    Buy Now
                  </span>
                </div>
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<ng-template #notFound>
  <div class="loading-container text-center h-screen flex flex-col items-center justify-center gap-2">
    <span class="loading loading-ring text-red-500 loading-xl"></span>
    <span class="loading loading-ring text-red-900 loading-md"></span>
  </div>
</ng-template>
