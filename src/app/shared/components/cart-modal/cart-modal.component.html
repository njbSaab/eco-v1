<!-- Overlay -->
<div
  *ngIf="isOpen$ | async"
  class="cart-overlay"
  (click)="close()">
</div>

<!-- Slide-in panel -->
<div
  class="cart-panel"
  [class.cart-panel--open]="isOpen$ | async">

  <!-- Header: tabs + close -->
  <div class="cart-panel__header">
    <div class="cart-panel__tabs">
      <button
        class="cart-tab"
        [class.cart-tab--active]="(activeTab$ | async) === 'cart'"
        (click)="setTab('cart')">
        Cart
        <span class="cart-tab__badge">{{ cartCount$ | async }}</span>
      </button>
      <button
        class="cart-tab"
        [class.cart-tab--active]="(activeTab$ | async) === 'favorites'"
        (click)="setTab('favorites')">
        Favorites
        <span class="cart-tab__badge">{{ favCount$ | async }}</span>
      </button>
    </div>
    <button class="cart-panel__close" (click)="close()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Divider -->
  <div class="cart-panel__divider"></div>

  <!-- CART TAB -->
  <ng-container *ngIf="(activeTab$ | async) === 'cart'">
    <div class="cart-panel__body">

      <!-- Empty state -->
      <div *ngIf="!(cartItems$ | async)?.length" class="cart-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <p>Your cart is empty</p>
      </div>

      <!-- Cart items -->
      <div class="cart-items">
        <div
          class="cart-item"
          *ngFor="let item of cartItems$ | async">

          <!-- Image -->
          <div class="cart-item__img">
            <img
              *ngIf="item.quiz.previewImage"
              [src]="item.quiz.previewImage"
              [alt]="item.quiz.title"/>
            <div *ngIf="!item.quiz.previewImage" class="cart-item__img-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
          </div>

          <!-- Info -->
          <div class="cart-item__info">
            <p class="cart-item__title">{{ item.quiz.title }}</p>
            <!-- Quantity controls -->
            <div class="cart-item__qty">
              <button class="qty-btn" (click)="updateQty(item.quiz.id, item.quantity - 1)">−</button>
              <span class="qty-value">{{ item.quantity }}</span>
              <button class="qty-btn" (click)="updateQty(item.quiz.id, item.quantity + 1)">+</button>
            </div>
          </div>

          <!-- Remove -->
          <button class="cart-item__remove" (click)="removeFromCart(item.quiz.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="cart-panel__footer" *ngIf="(cartItems$ | async)?.length">
      <span class="cart-total">Total items: {{ cartCount$ | async }}</span>
      <button class="cart-checkout-btn" (click)="openOrderForm()">
        Buy
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 12v4m-4-4v4m14.5-8h-21M18 8l-3-5M6 8l3-5m6 16s1 0 2 2c0 0 2.177-5 5-6m-10 5H9.583c-2.428 0-3.642 0-4.48-.71c-.84-.712-1.04-1.91-1.439-4.304L2.5 8h19l-.667 4"/></svg>
      </button>
    </div>
  </ng-container>

  <!-- FAVORITES TAB -->
  <ng-container *ngIf="(activeTab$ | async) === 'favorites'">
    <div class="cart-panel__body">

      <!-- Empty state -->
      <div *ngIf="!(favItems$ | async)?.length" class="cart-empty">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <p>No favorites yet</p>
      </div>

      <!-- Fav items -->
      <div class="cart-items">
        <div
          class="cart-item"
          *ngFor="let quiz of favItems$ | async">

          <!-- Image -->
          <div class="cart-item__img">
            <img
              *ngIf="quiz.previewImage"
              [src]="quiz.previewImage"
              [alt]="quiz.title"/>
            <div *ngIf="!quiz.previewImage" class="cart-item__img-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-1 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
          </div>

          <!-- Info -->
          <div class="cart-item__info">
            <p class="cart-item__title">{{ quiz.title }}</p>
          </div>

          <!-- Add to cart -->
          <button class="cart-item__add-btn" (click)="cartService.add(quiz)">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5.5 6H21l-1.68 8.39c-.16.8-.87 1.61-1.85 1.61H8.55c-.99 0-1.7-.82-1.85-1.62L5.5 6zM3 2H1v2h2l3.6 7.59L5.25 14A2 2 0 0 0 7 17h14v-2H7.42a.25.25 0 0 1-.25-.25l.03-.12L8.1 13h9.45c.75 0 1.41-.41 1.75-1.03L21.7 4H5.21L4.27 2H3z"/>
            </svg>
          </button>

          <!-- Remove -->
          <button class="cart-item__remove" (click)="removeFromFav(quiz.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </ng-container>
</div>

<!-- ── ORDER FORM POPUP ── -->
<ng-container *ngIf="showOrderForm">
  <div class="popup-overlay" (click)="closeOrderForm()"></div>
  <div class="popup-modal">
    <button class="popup-modal__close" (click)="closeOrderForm()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="popup-modal__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
    </div>

    <h2 class="popup-modal__title">Place an Order</h2>
    <p class="popup-modal__subtitle">Fill in your details and we'll get back to you shortly</p>

    <form class="popup-form" (ngSubmit)="submitOrder()">
      <div class="popup-form__field">
        <label class="popup-form__label">Full Name</label>
        <input
          class="popup-form__input"
          type="text"
          placeholder="Name"
          [(ngModel)]="orderName"
          name="orderName"
          required/>
      </div>

      <div class="popup-form__field">
        <label class="popup-form__label">Phone Number</label>
        <input
          class="popup-form__input"
          type="tel"
          placeholder="0979779797"
          [(ngModel)]="orderPhone"
          name="orderPhone"
          required/>
      </div>

      <div class="popup-form__field">
        <label class="popup-form__label">Email Address</label>
        <input
          class="popup-form__input"
          type="email"
          placeholder="email@com.ua"
          [(ngModel)]="orderEmail"
          name="orderEmail"
          required/>
      </div>

      <button
        class="popup-form__submit"
        type="submit"
        [disabled]="!orderName.trim() || !orderPhone.trim() || !orderEmail.trim()">
        Submit Order
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </form>
  </div>
</ng-container>

<!-- ── SUCCESS POPUP ── -->
<ng-container *ngIf="showSuccess">
  <div class="popup-overlay" (click)="closeSuccess()"></div>
  <div class="popup-modal popup-modal--success">
    <button class="popup-modal__close" (click)="closeSuccess()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="popup-success__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>

    <h2 class="popup-success__title">Thank you for your request!</h2>
    <p class="popup-success__text">Our manager will contact you as soon as possible.</p>

    <button class="popup-success__btn" (click)="closeSuccess()">Close</button>
  </div>
</ng-container>
